<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>E-ink PR Viewer</title>
  <style>
    /* E-ink optimized: high contrast, no animations, no shadows, minimal color */
    :root {
      --bg: #ffffff;
      --fg: #000000;
      --border: #000000;
      --muted: #444444;
      --light-bg: #f0f0f0;
      --font-body: Georgia, "Times New Roman", serif;
      --font-mono: "Courier New", Courier, monospace;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background: var(--bg);
      color: var(--fg);
      font-family: var(--font-body);
      font-size: 18px;
      line-height: 1.6;
      max-width: 860px;
      margin: 0 auto;
      padding: 2rem 1.5rem;
    }

    h1 {
      font-size: 1.8rem;
      font-weight: bold;
      border-bottom: 3px solid var(--fg);
      padding-bottom: 0.5rem;
      margin-bottom: 1.5rem;
      letter-spacing: 0.02em;
    }

    /* Config form */
    #config {
      border: 2px solid var(--fg);
      padding: 1.25rem 1.5rem;
      margin-bottom: 2rem;
    }

    #config h2 {
      font-size: 1rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 1rem;
    }

    .field-row {
      display: flex;
      gap: 0.75rem;
      flex-wrap: wrap;
      align-items: flex-end;
      margin-bottom: 0.75rem;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 0.25rem;
      flex: 1;
      min-width: 180px;
    }

    label {
      font-family: var(--font-mono);
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    input[type="text"],
    input[type="password"],
    select {
      font-family: var(--font-mono);
      font-size: 0.9rem;
      border: 2px solid var(--fg);
      padding: 0.4rem 0.6rem;
      background: var(--bg);
      color: var(--fg);
      width: 100%;
      outline: none;
    }

    input[type="text"]:focus,
    input[type="password"]:focus,
    select:focus {
      outline: 3px solid var(--fg);
      outline-offset: 1px;
    }

    button {
      font-family: var(--font-mono);
      font-size: 0.9rem;
      font-weight: bold;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      border: 2px solid var(--fg);
      padding: 0.45rem 1.2rem;
      background: var(--fg);
      color: var(--bg);
      cursor: pointer;
      white-space: nowrap;
    }

    button:hover, button:focus {
      background: var(--bg);
      color: var(--fg);
      outline: none;
    }

    /* PR list */
    #status {
      font-family: var(--font-mono);
      font-size: 0.85rem;
      color: var(--muted);
      margin-bottom: 1rem;
      min-height: 1.4em;
    }

    #pr-list {
      list-style: none;
    }

    .pr-item {
      border: 2px solid var(--fg);
      padding: 1rem 1.25rem;
      margin-bottom: 1rem;
    }

    .pr-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 1rem;
      margin-bottom: 0.4rem;
    }

    .pr-title {
      font-size: 1.05rem;
      font-weight: bold;
      text-decoration: none;
      color: var(--fg);
      flex: 1;
    }

    .pr-title:hover {
      text-decoration: underline;
    }

    .pr-state {
      font-family: var(--font-mono);
      font-size: 0.72rem;
      font-weight: bold;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      border: 2px solid var(--fg);
      padding: 0.15rem 0.5rem;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .pr-state.open  { background: var(--fg); color: var(--bg); }
    .pr-state.closed { background: var(--light-bg); color: var(--fg); }
    .pr-state.merged { background: var(--fg); color: var(--bg); }

    .pr-meta {
      font-family: var(--font-mono);
      font-size: 0.78rem;
      color: var(--muted);
      display: flex;
      flex-wrap: wrap;
      gap: 0 1.2rem;
      margin-bottom: 0.5rem;
    }

    .pr-body {
      font-size: 0.9rem;
      color: var(--fg);
      border-left: 3px solid var(--muted);
      padding-left: 0.75rem;
      margin-top: 0.75rem;
      white-space: pre-wrap;
      overflow-wrap: break-word;
    }

    .pr-labels {
      display: flex;
      flex-wrap: wrap;
      gap: 0.4rem;
      margin-top: 0.6rem;
    }

    .label {
      font-family: var(--font-mono);
      font-size: 0.7rem;
      border: 1px solid var(--fg);
      padding: 0.1rem 0.4rem;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .pr-stats {
      font-family: var(--font-mono);
      font-size: 0.78rem;
      margin-top: 0.6rem;
      display: flex;
      gap: 1rem;
      flex-wrap: wrap;
    }

    .diff-add { }
    .diff-del { }

    #pagination {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 1.5rem;
      font-family: var(--font-mono);
      font-size: 0.85rem;
    }

    #pagination button {
      padding: 0.4rem 0.9rem;
    }

    #pagination button:disabled {
      opacity: 0.3;
      cursor: default;
    }

    .empty {
      font-family: var(--font-mono);
      font-size: 0.9rem;
      color: var(--muted);
      padding: 2rem 0;
      text-align: center;
      border: 2px dashed var(--muted);
    }

    @media (max-width: 600px) {
      body { font-size: 16px; padding: 1rem; }
      .pr-header { flex-direction: column; gap: 0.4rem; }
    }
  </style>
</head>
<body>

<h1>E-ink PR Viewer</h1>

<div id="config">
  <h2>Repository</h2>
  <div class="field-row">
    <div class="field">
      <label for="repo-input">owner/repo</label>
      <input type="text" id="repo-input" placeholder="e.g. torvalds/linux" autocomplete="off" spellcheck="false">
    </div>
    <div class="field" style="max-width:140px">
      <label for="state-select">State</label>
      <select id="state-select">
        <option value="open">Open</option>
        <option value="closed">Closed</option>
        <option value="all">All</option>
      </select>
    </div>
    <button id="load-btn" onclick="loadPRs(1)">Load</button>
  </div>
  <div class="field-row">
    <div class="field">
      <label for="token-input">GitHub Token (optional, for private repos)</label>
      <input type="password" id="token-input" placeholder="ghp_..." autocomplete="off" spellcheck="false">
    </div>
  </div>
</div>

<div id="status"></div>
<ul id="pr-list"></ul>
<div id="pagination" style="display:none">
  <button id="prev-btn" disabled onclick="loadPRs(currentPage - 1)">&#8592; Prev</button>
  <span id="page-label"></span>
  <button id="next-btn" disabled onclick="loadPRs(currentPage + 1)">Next &#8594;</button>
</div>

<script>
  const PER_PAGE = 20;
  let currentPage = 1;
  let totalCount = 0;

  // Restore saved values
  const savedRepo = localStorage.getItem('eink-repo');
  const savedState = localStorage.getItem('eink-state');
  if (savedRepo) document.getElementById('repo-input').value = savedRepo;
  if (savedState) document.getElementById('state-select').value = savedState;

  // Allow pressing Enter to load
  document.getElementById('repo-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') loadPRs(1);
  });

  function apiHeaders() {
    const token = document.getElementById('token-input').value.trim();
    const headers = { 'Accept': 'application/vnd.github+json', 'X-GitHub-Api-Version': '2022-11-28' };
    if (token) headers['Authorization'] = `Bearer ${token}`;
    return headers;
  }

  function setStatus(msg) {
    document.getElementById('status').textContent = msg;
  }

  function formatDate(iso) {
    if (!iso) return '';
    const d = new Date(iso);
    return d.toLocaleDateString('en-US', { year: 'numeric', month: 'short', day: 'numeric' });
  }

  function stateLabel(pr) {
    if (pr.pull_request && pr.pull_request.merged_at) return 'merged';
    return pr.state; // 'open' or 'closed'
  }

  async function loadPRs(page) {
    const repo = document.getElementById('repo-input').value.trim();
    const state = document.getElementById('state-select').value;

    if (!repo || !repo.includes('/')) {
      setStatus('Enter a valid owner/repo (e.g. facebook/react)');
      return;
    }

    localStorage.setItem('eink-repo', repo);
    localStorage.setItem('eink-state', state);

    currentPage = page;
    setStatus('Loading...');
    document.getElementById('pr-list').innerHTML = '';
    document.getElementById('pagination').style.display = 'none';

    try {
      // Use issues API so we get full count for pagination
      const url = `https://api.github.com/repos/${repo}/pulls?state=${state}&per_page=${PER_PAGE}&page=${page}&sort=updated&direction=desc`;
      const res = await fetch(url, { headers: apiHeaders() });

      if (!res.ok) {
        const err = await res.json().catch(() => ({}));
        setStatus(`Error ${res.status}: ${err.message || res.statusText}`);
        return;
      }

      const prs = await res.json();

      // Get total count from Link header
      const link = res.headers.get('Link') || '';
      const lastMatch = link.match(/[?&]page=(\d+)>; rel="last"/);
      const lastPage = lastMatch ? parseInt(lastMatch[1]) : page;
      totalCount = lastPage * PER_PAGE; // approximation

      renderPRs(prs, repo, page, lastPage);
    } catch (e) {
      setStatus(`Network error: ${e.message}`);
    }
  }

  function truncateBody(text, maxLen = 400) {
    if (!text) return '';
    const stripped = text.replace(/<!--[\s\S]*?-->/g, '').trim();
    if (stripped.length <= maxLen) return stripped;
    return stripped.slice(0, maxLen).replace(/\s+\S*$/, '') + '…';
  }

  function renderPRs(prs, repo, page, lastPage) {
    const list = document.getElementById('pr-list');

    if (prs.length === 0) {
      list.innerHTML = `<div class="empty">No pull requests found.</div>`;
      setStatus('');
      return;
    }

    setStatus(`Showing ${(page - 1) * PER_PAGE + 1}–${(page - 1) * PER_PAGE + prs.length} · page ${page} of ${lastPage}`);

    list.innerHTML = prs.map(pr => {
      const state = stateLabel(pr);
      const labels = (pr.labels || []).map(l =>
        `<span class="label">${escHtml(l.name)}</span>`
      ).join('');
      const bodySnippet = truncateBody(pr.body);
      const bodyHtml = bodySnippet
        ? `<div class="pr-body">${escHtml(bodySnippet)}</div>`
        : '';
      const labelsHtml = labels ? `<div class="pr-labels">${labels}</div>` : '';

      return `
        <li class="pr-item">
          <div class="pr-header">
            <a class="pr-title" href="${pr.html_url}" target="_blank" rel="noopener">#${pr.number} ${escHtml(pr.title)}</a>
            <span class="pr-state ${state}">${state}</span>
          </div>
          <div class="pr-meta">
            <span>by ${escHtml(pr.user.login)}</span>
            <span>opened ${formatDate(pr.created_at)}</span>
            ${state !== 'open' ? `<span>closed ${formatDate(pr.closed_at)}</span>` : ''}
            <span>updated ${formatDate(pr.updated_at)}</span>
            <span>${pr.comments} comment${pr.comments !== 1 ? 's' : ''}</span>
          </div>
          ${labelsHtml}
          ${bodyHtml}
        </li>`;
    }).join('');

    // Pagination
    const pag = document.getElementById('pagination');
    const prevBtn = document.getElementById('prev-btn');
    const nextBtn = document.getElementById('next-btn');
    document.getElementById('page-label').textContent = `Page ${page} / ${lastPage}`;
    prevBtn.disabled = page <= 1;
    nextBtn.disabled = page >= lastPage;
    pag.style.display = 'flex';
  }

  function escHtml(str) {
    if (str == null) return '';
    return String(str)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }

  // Auto-load if repo is saved
  if (savedRepo) loadPRs(1);
</script>
</body>
</html>
